
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#111111" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Barrow Quest</title>

    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="coin-hud">
      <div>KYLAN: <span id="h-k">0</span> coins</div>
      <div>PIPER: <span id="h-p">0</span> coins</div>
      <div>KHYL: <span id="h-me">0</span> coins</div>
      <div id="rank-hud">RANK 1</div>
      <div id="capture-hud">CAPTURE: -</div>
    </div>

    <div id="map"></div>
    <button id="action-trigger" aria-label="Action">⚡</button>

    <div class="hud-dock">
      <button id="btn-home" class="hud-btn">Home</button>
      <button id="btn-settings" class="hud-btn">Settings</button>
    </div>

    <div id="start-modal" class="full-modal" style="display:block;">
      <div class="modal-header">
        <h2>BARROW QUEST</h2>
        <button id="btn-start-close-x" class="close-x">✕</button>
      </div>

      <div class="start-card">
        <h3>Mode</h3>
        <div class="pill-row">
          <button class="pill active" id="pill-kids">KIDS</button>
          <button class="pill" id="pill-teen">TEEN / ADULT</button>
        </div>
      </div>

      <div class="start-card">
        <h3>Experience</h3>
        <div class="pill-row">
          <button class="pill active" id="pill-park">BARROW PARK</button>
          <button class="pill" id="pill-docks">THE DOCKS</button>
          <button class="pill" id="pill-full">FULL BARROW</button>
        </div>
      </div>

      <div class="start-card">
        <button class="win-btn" id="btn-start">START ADVENTURE</button>
        <button class="win-btn dark" id="btn-open-settings">SETTINGS</button>
      </div>
    </div>

    <div id="home-modal" class="full-modal">
      <div class="modal-header">
        <h2>HOME BASE LOG</h2>
        <button id="btn-home-close-x" class="close-x">✕</button>
      </div>
      <div id="home-summary"></div>
      <div id="home-list"></div>
      <button class="win-btn dark" id="btn-home-close">CLOSE</button>
    </div>

    <div id="settings-modal" class="full-modal">
      <div class="modal-header">
        <h2>SYSTEM CONFIG</h2>
        <button id="btn-close-settings-x" class="close-x">✕</button>
      </div>

      <div class="settings-card">
        <h3>Reward Target</h3>
        <select id="participant-select">
          <option value="both">BOTH KIDS</option>
          <option value="kylan">KYLAN ONLY</option>
          <option value="piper">PIPER ONLY</option>
          <option value="khyl">KHYL ONLY</option>
        </select>
      </div>

      <div class="settings-card">
        <h3>Enter Radius</h3>
        <div><span id="radius-label">30</span>m</div>
        <input type="range" id="enter-radius" min="10" max="80" step="5" value="30" />
      </div>

      <div class="settings-card">
        <h3>Capture Need</h3>
        <div><span id="capture-label">3</span> modes</div>
        <input type="range" id="capture-need" min="1" max="6" step="1" value="3" />
      </div>

      <button class="win-btn dark" id="btn-close-settings">CLOSE</button>
    </div>

    <div id="quest-modal" class="full-modal">
      <h1 id="q-name">ZONE</h1>
      <div id="quest-status">STATUS: -</div>

      <div class="mission-grid">
        <div class="m-tile" data-mode="quiz">QUIZ</div>
        <div class="m-tile" data-mode="battle">BATTLE</div>
        <div class="m-tile" data-mode="history">HISTORY</div>
        <div class="m-tile" data-mode="logic">LOGIC</div>
        <div class="m-tile" data-mode="speed">SPEED</div>
        <div class="m-tile" data-mode="health">HEALTH</div>
        <div class="m-tile" data-mode="activity">ACTIVITY</div>
        <div class="m-tile" data-mode="family">FAMILY</div>
      </div>

      <button class="win-btn dark" id="btn-close-quest">CLOSE</button>
    </div>

    <div id="task-modal" class="full-modal">
      <h1 id="task-title">MISSION</h1>
      <div class="task-card">
        <p id="task-desc"></p>
        <div id="task-options"></div>

        <div id="reward-panel" style="display:none;">
          <div class="reward-title">AWARD POINTS TO:</div>
          <div class="reward-grid">
            <button class="win-btn" id="btn-award-kylan">KYLAN + POINTS</button>
            <button class="win-btn" id="btn-award-piper">PIPER + POINTS</button>
            <button class="win-btn" id="btn-award-khyl">KHYL + POINTS</button>
            <button class="win-btn" id="btn-award-both">BOTH + POINTS</button>
          </div>
        </div>

        <div id="task-feedback" style="display:none;">Correct</div>
      </div>

      <button class="win-btn" id="btn-task-complete">COMPLETE</button>
      <button class="win-btn dark" id="btn-task-close">CLOSE</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="./app.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./service-worker.js").catch(() => {});
        });
      }

      const click = (id, targetId) => {
        const a = document.getElementById(id);
        const b = document.getElementById(targetId);
        if (a && b) a.addEventListener("click", () => b.click());
      };

      click("btn-close-settings-x", "btn-close-settings");
      click("btn-home-close-x", "btn-home-close");

      const pill = (onId, offId) => {
        const on = document.getElementById(onId);
        const off = document.getElementById(offId);
        if (!on || !off) return;
        on.classList.add("active");
        off.classList.remove("active");
      };

      const kids = document.getElementById("pill-kids");
      const teen = document.getElementById("pill-teen");
      if (kids && teen) {
        kids.addEventListener("click", () => pill("pill-kids", "pill-teen"));
        teen.addEventListener("click", () => pill("pill-teen", "pill-kids"));
      }

      const setExp = (activeId) => {
        ["pill-park", "pill-docks", "pill-full"].forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.classList.toggle("active", id === activeId);
        });
      };

      document.getElementById("pill-park")?.addEventListener("click", () => setExp("pill-park"));
      document.getElementById("pill-docks")?.addEventListener("click", () => setExp("pill-docks"));
      document.getElementById("pill-full")?.addEventListener("click", () => setExp("pill-full"));

      document.getElementById("btn-open-settings")?.addEventListener("click", () => {
        const sm = document.getElementById("settings-modal");
        if (sm) sm.style.display = "block";
      });

      const hideStart = () => {
        const startModal = document.getElementById("start-modal");
        if (startModal) startModal.style.display = "none";
      };

      document.getElementById("btn-start-close-x")?.addEventListener("click", hideStart);
      document.getElementById("btn-start")?.addEventListener("click", hideStart);
    </script>
  </body>
</html>
